<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCL Performance Hub · Connecticut Cricket League</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#07110A;font-family:'DM Sans',sans-serif;}

/* ═══════════════════════════════════════════
   NAV — desktop: single row (52px)
         mobile:  two rows (brand + tabs = 90px)
═══════════════════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:999;
  background:#0B1A0F;
  border-bottom:1px solid #1C3825;
  box-shadow:0 2px 16px rgba(0,0,0,0.5);
}
.nav::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#C9A84C,transparent);
  pointer-events:none;
}

/* Top row: brand + live indicator */
.nav-top{
  display:flex;align-items:center;
  padding:0 16px;height:48px;gap:0;
}
.brand{
  display:flex;align-items:center;gap:9px;flex:1;min-width:0;
}
.brand img{
  height:30px;width:auto;flex-shrink:0;
  filter:drop-shadow(0 0 5px rgba(0,0,0,0.5));
}
.brand-name{
  font-family:'Playfair Display',serif;font-size:13px;font-weight:700;line-height:1.15;
  background:linear-gradient(135deg,#F0D080,#C9A84C);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.brand-sub{
  font-size:9px;letter-spacing:1.4px;text-transform:uppercase;
  color:#4D7058;font-weight:500;white-space:nowrap;
}
.live{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  font-size:10px;color:#4D7058;letter-spacing:1px;
  padding-left:12px;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:#4ADE80;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Tab row */
.nav-tabs{
  display:flex;
  border-top:1px solid #1C3825;
  background:#07110A;
}
.tab{
  flex:1;
  padding:0 4px;height:42px;
  border:none;border-bottom:3px solid transparent;
  background:transparent;color:#4D7058;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:color .15s,border-color .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  position:relative;top:3px;
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{color:#EEF3EF;}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C;}

/* Nav height variable used by panels */
:root{--nav-h:90px;}

/* ═══════════════════════════════════════════
   PANELS
═══════════════════════════════════════════ */
.panel{
  position:fixed;
  top:var(--nav-h);left:0;right:0;bottom:0;
  display:none;
}
.panel.active{display:block;}
iframe{width:100%;height:100%;border:none;display:block;}

/* ═══════════════════════════════════════════
   DESKTOP (≥ 640px) — revert to single row
═══════════════════════════════════════════ */
@media(min-width:640px){
  :root{--nav-h:52px;}
  .nav-top{height:52px;padding:0 20px;}
  .brand img{height:32px;}
  .brand-name{font-size:13px;}
  .nav-tabs{
    position:absolute;top:0;left:auto;right:auto;
    border-top:none;background:transparent;
    height:52px;
    /* sit inline after the brand — we use JS to keep this approach or
       use a flexbox layout trick on .nav */
    display:none; /* hidden on desktop; tabs moved into nav-top */
  }
  .nav-top-tabs{display:flex !important;}
  .live{display:flex;}
}

/* On mobile: hide desktop inline tabs; show the bottom tab row */
.nav-top-tabs{ display:none; gap:0; height:52px; align-items:flex-end; }
.nav-top-tabs .tab{ height:52px; top:3px; font-size:12px; letter-spacing:.8px; padding:0 20px; flex:none; }

</style>
</head>

<script>

function show(which) {
  // Switch panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + which).classList.add('active');
  // Sync both desktop and mobile tab sets
  ['d','m'].forEach(prefix => {
    document.querySelectorAll(`#${prefix === 'd' ? 'desktop' : 'mobile'}-tabs .tab`)
      .forEach(t => t.classList.remove('active'));
    const el = document.getElementById(prefix + 'tab-' + which);
    if (el) el.classList.add('active');
  });
}
